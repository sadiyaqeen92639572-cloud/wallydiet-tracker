name: Update Tool Rental Prices

on:
  # schedule:
  #   - cron: '0 3 1 2,4,6,8,10,12 *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run price update script
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: node tool-rental/update-data.js

      - name: Commit updated prices
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add tool-rental/index.html tool-rental/products-db.json
          git diff --staged --quiet || git commit -m "Auto-update: Tool rental prices $(date '+%Y-%m-%d')"
          git push
