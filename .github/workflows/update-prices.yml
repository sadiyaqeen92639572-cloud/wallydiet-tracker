name: Update Walmart Prices

on:
  schedule:
    # Run every 2 months on the 1st: Feb, Apr, Jun, Aug, Oct, Dec at 2 AM UTC
    - cron: '0 2 1 2,4,6,8,10,12 *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install axios cheerio

      - name: Run price update script
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: node update-data.js

      - name: Commit updated prices
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add index.html products-db.json
          git diff --staged --quiet || git commit -m "Auto-update: Walmart prices $(date '+%Y-%m-%d')"
          git push
