name: Update MicroSD Retro Gaming Tracker

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 8am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update microSD tracker data
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: node retro-microsd/update-data.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add retro-microsd/index.html retro-microsd/products-db.json retro-microsd/api-cache/
          git diff --staged --quiet || git commit -m "Update MicroSD tracker prices $(date '+%Y-%m-%d')"
          git push
